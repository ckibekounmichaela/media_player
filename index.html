<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; }
        .header { background: #2c2c2c; padding: 15px; text-align: center; }
        .search { padding: 15px; background: #333; }
        .search input { width: 100%; padding: 10px; border-radius: 5px; border: none; }
        .country-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 15px; max-height: 300px; overflow-y: auto; }
        .country-btn { background: #4CAF50; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
        .channels-list { max-height: 400px; overflow-y: auto; padding: 15px; }
        .channel-item { background: #2c2c2c; margin: 5px 0; padding: 10px; border-radius: 5px; cursor: pointer; }
        .channel-item:hover { background: #3c3c3c; }
        .video-container { position: fixed; bottom: 0; left: 0; right: 0; background: black; }
        video { width: 100%; max-height: 300px; }
        @media (min-width: 768px) {
            .main-container { display: flex; }
            .sidebar { width: 30%; }
            .content { width: 70%; }
            video { max-height: 400px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📺 M3U IPTV Player</h1>
    </div>
    
    <div class="search">
        <input type="text" id="searchInput" placeholder="Rechercher une chaîne..." onkeyup="searchChannels()">
    </div>
    
    <div class="main-container">
        <div class="sidebar">
            <div class="country-grid" id="countryGrid"></div>
        </div>
        <div class="content">
            <div class="channels-list" id="channelsList"></div>
        </div>
    </div>
    
    <div class="video-container" id="videoContainer" style="display:none;">
        <video id="videoPlayer" controls autoplay>
            Votre navigateur ne supporte pas la vidéo.
        </video>
        <button onclick="closeVideo()" style="position:absolute; top:5px; right:5px; background:red; color:white; border:none; border-radius:50%; width:30px; height:30px;">✕</button>
    </div>

    <script>
        // Liste des pays (basée sur vos fichiers)
        const countries = [
            "fr", "us", "uk", "de", "es", "it", "ca", "au", "br", "in",
            "jp", "cn", "ru", "mx", "nl", "be", "ch", "at", "se", "no"
        ];
        
        const countryNames = {
            "fr": "🇫🇷 France", "us": "🇺🇸 USA", "uk": "🇬🇧 UK",
            "de": "🇩🇪 Allemagne", "es": "🇪🇸 Espagne", "it": "🇮🇹 Italie",
            "ca": "🇨🇦 Canada", "au": "🇦🇺 Australie", "br": "🇧🇷 Brésil"
        };
        
        let currentChannels = [];
        
        // Afficher les pays
        function loadCountries() {
            const grid = document.getElementById('countryGrid');
            countries.forEach(country => {
                const btn = document.createElement('button');
                btn.className = 'country-btn';
                btn.textContent = countryNames[country] || country.toUpperCase();
                btn.onclick = () => loadPlaylist(country);
                grid.appendChild(btn);
            });
        }
        
        // Charger une playlist
        async function loadPlaylist(country) {
            const url = `https://raw.githubusercontent.com/your-repo/streams/main/${country}.m3u`;
            try {
                const response = await fetch(url);
                const content = await response.text();
                parseM3U(content);
            } catch (error) {
                console.error('Erreur:', error);
                alert(`Impossible de charger ${country}`);
            }
        }
        
        // Parser M3U
        function parseM3U(content) {
            const lines = content.split('\n');
            const channels = [];
            let currentChannel = null;
            
            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',')[1];
                    currentChannel = { name: name, url: null };
                } else if (line && !line.startsWith('#') && currentChannel) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            }
            
            currentChannels = channels;
            displayChannels(channels);
        }
        
        // Afficher les chaînes
        function displayChannels(channels) {
            const container = document.getElementById('channelsList');
            container.innerHTML = '';
            
            channels.forEach(channel => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `
                    <strong>${channel.name}</strong><br>
                    <small>${channel.url ? '✅ Disponible' : '❌ Non disponible'}</small>
                `;
                if (channel.url) {
                    div.onclick = () => playChannel(channel.url, channel.name);
                }
                container.appendChild(div);
            });
        }
        
        // Rechercher des chaînes
        function searchChannels() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = currentChannels.filter(ch => 
                ch.name.toLowerCase().includes(term)
            );
            displayChannels(filtered);
        }
        
        // Lire une chaîne
        function playChannel(url, name) {
            const video = document.getElementById('videoPlayer');
            const container = document.getElementById('videoContainer');
            video.src = url;
            container.style.display = 'block';
            video.play();
            document.title = `📺 ${name}`;
        }
        
        // Fermer la vidéo
        function closeVideo() {
            const video = document.getElementById('videoPlayer');
            const container = document.getElementById('videoContainer');
            video.pause();
            video.src = '';
            container.style.display = 'none';
            document.title = '📺 M3U IPTV Player';
        }
        
        // Initialiser
        loadCountries();
        
        // Service Worker pour PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
